name: stagex-release # build/publish StageX images for a release

on:
  workflow_call: # Triggered by other workflows (e.g. release-plz)
    inputs:
      release_tag:
        description: "Release tag (eg 'qos_core-v0.5.0') used to build and publish images"
        required: true
        type: string
  workflow_dispatch: # Allows manual release invocation
    inputs:
      release_tag:
        description: "Release tag to build/publish from (eg 'qos_core-v0.5.0')"
        required: true
        type: string

jobs:
  build:
    name: build artifacts
    runs-on: ubicloud-standard-16
    environment:
      name: release
    permissions:
      contents: write   # needed for uploading release assets
      packages: write   # needed for pushing to GHCR
    env:
      release_tag: ${{ inputs.release_tag }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag }}

      - name: Verify checkout matches requested release tag
        run: |
          expected="$(git rev-list -n1 -- "$release_tag")"
          actual="$(git rev-parse HEAD)"
          if [ "$expected" != "$actual" ]; then
            echo "Expected tag $release_tag to resolve to $expected, but HEAD is $actual" >&2
            exit 1
          fi

      - name: Setup Docker
        uses: ./.github/actions/docker-setup

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run `make`
        shell: 'script -q -e -c "bash {0}"'
        run: make -j$(nproc)

      - name: Push images to GHCR
        run: |
          # Extract version from tag (e.g. "qos_core-v0.5.0" -> "v0.5.0")
          version="${release_tag#qos_core-}"
          for name in qos_client qos_host qos_enclave qos_bridge; do
            env -C out/${name} tar -cf - . | docker load
            docker tag "qos-local/${name}:latest" "ghcr.io/tkhq/${name}:${version}"
            docker tag "qos-local/${name}:latest" "ghcr.io/tkhq/${name}:latest"
            docker push "ghcr.io/tkhq/${name}:${version}"
            docker push "ghcr.io/tkhq/${name}:latest"
          done

      - name: Extract PCRs
        run: |
          id=$(docker create "qos-local/qos_enclave:latest")
          docker cp "${id}:/nitro.pcrs" out/nitro.pcrs
          docker rm "${id}"

      - name: Upload PCRs to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # upload to qos_core release tag
        run: gh release upload "${release_tag}" out/nitro.pcrs --clobber
