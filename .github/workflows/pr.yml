on: [pull_request]

name: PR

jobs:
  test:
    name: test
    runs-on: ubicloud-standard-2
    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libpcsclite-dev
      - name: Run tests
        run: make -C src test
      - name: Run legacy protocol compat tests
        run: cargo test -p integration --features legacy-protocol-compat --test protocol_legacy_decode

  lint:
    name: lint
    runs-on: ubicloud-standard-2
    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libpcsclite-dev
      - name: Run linting
        run: make -C src lint

  check-publishable-crates-standalone:
    name: check-publishable-crates-standalone (${{ matrix.package }})
    runs-on: ubicloud-standard-2
    strategy:
      fail-fast: false
      matrix:
        package:
          - qos_client
          - qos_core
          - qos_crypto
          - qos_hex
          - qos_net
          - qos_p256
          - qos_nsm
          - qos_test_primitives
          - qos_json
    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libpcsclite-dev
      - name: Check publishable crates standalone
        # Check one selected package at a time so unrelated workspace members
        # cannot hide missing direct dependency features through unification.
        run: cargo check -p ${{ matrix.package }}

  build-linux-only-crates:
    name: build-linux-only-crates
    runs-on: ubicloud-standard-8
    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Docker
        uses: ./.github/actions/docker-setup
      - name: Run build-linux-only
        run: make -j$(nproc) build-linux-only
