name: Release-plz Publish # publish to crates.io

permissions:
  contents: write

on:
  pull_request: # trigger a release when the release PR is merged
    types: [ closed ]
    branches: [ main ]

jobs:
  # Publish crates when the release PR is merged.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # This environment releases crates and builds, and requires approval
    environment: release 
    # only trigger this job for a merged PR with a "release" label
    if: >
      github.repository_owner == 'tkhq' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    permissions:
      contents: write
      # Required for trusted publishing, see https://release-plz.dev/docs/github/quickstart#2-set-the-cargo_registry_token-secret
      id-token: write 
    steps:
      - name: git checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # `fetch-depth: 0` is needed to clone all the git history, which is necessary to
          # release from the latest commit of the release PR.
          fetch-depth: 0
      - name: install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 #v1
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Update apt cache
        run: sudo apt-get update
      - name: Install PCSC deps
        # for verification during cargo publish
        run: sudo apt-get install -y pkg-config libpcsclite-dev
      - name: Run release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release
          manifest_path: src/Cargo.toml
          config: src/release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  # On a release, build and publish the StageX images and extract the PCRs.
  detect-release-tag:
    name: Detect release tag
    needs: release-plz-release
    if: needs.release-plz-release.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.detect.outputs.release_tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main
      - run: git fetch --tags --force
      - id: detect
        env:
          # check both PR head and merge SHAs for the tag in case of merge or squash commit
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          tag="$(git tag --points-at "$PR_HEAD_SHA" | grep -E '^qos_core-v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [ -z "$tag" ] && [ -n "$PR_MERGE_SHA" ]; then
            tag="$(git tag --points-at "$PR_MERGE_SHA" | grep -E '^qos_core-v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
  stagex-release:
    name: Build/publish images for release
    needs: detect-release-tag
    if: needs.detect-release-tag.outputs.release_tag != ''
    uses: ./.github/workflows/stagex-release.yml
    with:
      release_tag: ${{ needs.detect-release-tag.outputs.release_tag }}
    permissions:
      contents: write
      packages: write
    secrets: inherit
