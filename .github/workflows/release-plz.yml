name: Release-plz

permissions:
  pull-requests: write
  issues: write # needed for labels
  contents: write

on:
  pull_request: # trigger a release when the release PR is merged
    types: [ closed ]
    branches: [ main ]
  push: # trigger a release PR update on pushes to main
    branches: [ main ]

jobs:
  # Publish crates when the release PR is merged.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # This environment gives access to CARGO_REGISTRY_TOKEN, and requires approval
    environment: release 
    # only trigger this job for a merged PR with a "release" label
    if: >
      github.repository_owner == 'tkhq' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    permissions:
      contents: write
    steps:
      - name: git checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # `fetch-depth: 0` is needed to clone all the git history, which is necessary to
          # release from the latest commit of the release PR.
          fetch-depth: 0
      - name: install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 #v1
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Update apt cache
        run: sudo apt-get update
      - name: Install PCSC deps
        # for verification during cargo publish
        run: sudo apt-get install -y pkg-config libpcsclite-dev
      - name: Run release-plz
        uses: release-plz/action@f708778669256143d984cce4b23592637532e040 # v0.5.127
        with:
          command: release
          manifest_path: src/Cargo.toml
          config: src/release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  
  # On a release, build and publish the StageX images and extract the PCRs.
  detect-release-tag:
    name: Detect release tag
    needs: release-plz-release
    if: needs.release-plz-release.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.detect.outputs.release_tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: main
      - run: git fetch --tags --force
      - id: detect
        run: |
          tag="$(git tag --points-at HEAD | grep -E '^qos_core-v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
  stagex-release:
    name: Build/publish images for release
    needs: detect-release-tag
    if: needs.detect-release-tag.outputs.release_tag != ''
    uses: ./.github/workflows/stagex.yml
    with:
      release_tag: ${{ needs.detect-release-tag.outputs.release_tag }}
    permissions:
      contents: write
      packages: write
    secrets: inherit

  # Create or update release PR with the new versions and changelog on pushes to main
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # trigger on pushes to main
    if: >
      github.repository_owner == 'tkhq' &&
      github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
      issues: write # needed for labels
    concurrency:
      group: release-plz-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: git checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # `fetch-depth: 0` is needed to clone all the git history, which is necessary to
          # determine the next version and build the changelog.
          fetch-depth: 0
      - name: install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 #v1
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Run release-plz
        uses: release-plz/action@f708778669256143d984cce4b23592637532e040 # v0.5.127
        with:
          command: release-pr
          manifest_path: src/Cargo.toml
          config: src/release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
