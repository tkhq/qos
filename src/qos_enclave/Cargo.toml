[package]
name = "qos_enclave"
version = "1.2.0"
authors = [""]
edition = "2021"
# keep in sync with upstream MSRV
rust-version = "1.71"
publish = false

[dependencies]
# As of 8/2025, AWS doesn't have a recent crate version of aws-nitro-enclaves-cli published
# in a typical crate repository
# Directly use the git version on GitHub as a workaround
#
# Note: the 1.4.3 release is still incorrectly labeled as crate version 1.4.2
nitro-cli = { git = "https://github.com/aws/aws-nitro-enclaves-cli", tag = "v1.4.3" }
libc = "0.2.172"

[features]
default = []
