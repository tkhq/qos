[package]
name = "xtask"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
qos_core = { path = "../qos_core", default-features = false, features = ["mock"] }
qos_p256 = { path = "../qos_p256" }
qos_crypto = { path = "../qos_crypto" }
qos_hex = { path = "../qos_hex" }
integration = { path = "../integration" }
borsh = { version = "1.0", features = ["std", "derive"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
